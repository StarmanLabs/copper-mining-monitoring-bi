version: 1
mapping_name: "example_company_monthly_mapping"
description: "Public-safe example showing how private monthly company exports can be mapped into the repository's canonical schemas."

datasets:
  plan_monthly:
    source_file: "monthly_plan_export.csv"
    source_dataset_label: "planning_budget_export"
    normalize_period: true
    mapping_note: "Example mapping from a planning or budget extract into the canonical monthly plan schema."
    column_map:
      operation_code: site_id
      fiscal_month: period
      milled_tonnes_budget: throughput_tonnes_plan
      copper_grade_budget_pct: head_grade_pct_plan
      recovery_budget_pct: recovery_pct_plan
      unit_opex_budget_usdpt: unit_cost_usd_per_tonne_plan
      copper_price_budget_usdlb: copper_price_usd_per_lb_plan
      tcrc_budget_usdlb: tc_rc_usd_per_lb_plan
      payable_budget_pct: payable_percent_plan
      sustaining_capex_budget_usd: sustaining_capex_usd_plan
      working_capital_budget_usd: working_capital_change_usd_plan
    defaults:
      plan_version: "private_monthly_budget"

  actual_production_monthly:
    source_file: "production_actuals_export.csv"
    source_dataset_label: "monthly_production_export"
    normalize_period: true
    mapping_note: "Example mapping from a production accounting export."
    column_map:
      operation_code: site_id
      reporting_month: period
      plant_tonnes_actual: throughput_tonnes_actual
      payable_copper_tonnes_actual: copper_production_tonnes_actual

  plant_performance_monthly:
    source_file: "plant_performance_export.csv"
    source_dataset_label: "process_kpi_export"
    normalize_period: true
    mapping_note: "Example mapping from a plant KPI export where rates arrive as decimals and need scaling."
    column_map:
      operation_code: site_id
      reporting_month: period
      head_grade_pct_points: head_grade_pct_actual
      recovery_decimal: recovery_pct_actual
      availability_decimal: availability_pct_actual
      utilization_decimal: utilization_pct_actual
      downtime_hours_month: downtime_hours_actual
    value_multipliers:
      recovery_pct_actual: 100
      availability_pct_actual: 100
      utilization_pct_actual: 100

  cost_actuals_monthly:
    source_file: "cost_control_export.csv"
    source_dataset_label: "cost_control_actuals"
    normalize_period: true
    mapping_note: "Example mapping from monthly cost control outputs."
    column_map:
      operation_code: site_id
      reporting_month: period
      mine_cost_usd: mining_cost_usd_actual
      plant_cost_usd: processing_cost_usd_actual
      admin_cost_usd: ga_cost_usd_actual
      sustaining_capex_usd: sustaining_capex_usd_actual
      working_capital_change_usd: working_capital_change_usd_actual

  market_prices_monthly:
    source_file: "commercial_assumptions_export.csv"
    source_dataset_label: "commercial_inputs_export"
    normalize_period: true
    mapping_note: "Example mapping from a monthly commercial assumptions or realized price export."
    column_map:
      operation_code: site_id
      reporting_month: period
      copper_price_realized_usdlb: copper_price_usd_per_lb_actual
      treatment_refining_charge_usdlb: tc_rc_usd_per_lb_actual
      payable_factor_decimal: payable_percent_actual
      benchmark_name: benchmark_price_name
    value_multipliers:
      payable_percent_actual: 100

  process_driver_monthly:
    source_file: "process_driver_export.csv"
    source_dataset_label: "process_driver_detail_export"
    normalize_period: true
    mapping_note: "Example mapping from a monthly process-area driver export used for downtime and feed-mix diagnostics."
    column_map:
      operation_code: site_id
      reporting_month: period
      circuit_name: process_area
      ore_source_label: ore_source
      stockpile_feed_flag: stockpile_flag
      feed_mix_pct: ore_mix_pct
      throughput_budget_tonnes: throughput_tonnes_plan
      throughput_actual_tonnes: throughput_tonnes_actual
      copper_plan_tonnes: copper_production_tonnes_plan
      copper_actual_tonnes: copper_production_tonnes_actual
      availability_pct_points: availability_pct
      downtime_hours_month: downtime_hours

  cost_center_monthly:
    source_file: "cost_center_detail_export.csv"
    source_dataset_label: "cost_center_detail_export"
    normalize_period: true
    mapping_note: "Example mapping from a monthly cost-center summary used for unit-cost and margin-pressure review."
    column_map:
      operation_code: site_id
      reporting_month: period
      cost_center_name: cost_center
      monthly_cost_budget_usd: cost_usd_plan
      monthly_cost_actual_usd: cost_usd_actual
